version: 1
disable_existing_loggers: false

formatters:
  json:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
  plain:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: plain
    stream: ext://sys.stdout

  error_console:
    class: logging.StreamHandler
    level: ERROR
    formatter: plain
    stream: ext://sys.stderr

loggers:
  app:
    level: INFO
    handlers: [console, error_console]
    propagate: false

  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false

  sqlalchemy:
    level: WARNING
    handlers: [console]
    propagate: false

  neo4j:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console, error_console]