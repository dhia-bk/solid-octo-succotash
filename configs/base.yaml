app:
  name: project-pulse-kg
  env: dev
  debug: false
  timezone: UTC

api:
  host: 0.0.0.0
  port: 8000
  version: v1
  cors:
    enabled: false
    allow_origins: []
    allow_methods: ["GET", "POST", "PUT", "DELETE"]
    allow_headers: ["*"]

security:
  api_key_enabled: false
  api_key_header: X-API-Key
  mask_secrets_in_logs: true

runtime:
  max_retries: 3
  retry_backoff_seconds: 2
  default_batch_size: 5000
  max_batch_size: 20000
  fail_fast: true

pipelines:
  full_backfill_enabled: true
  incremental_sync_enabled: true
  serving_materialization_enabled: true
  source_inventory_audit_enabled: true

checkpoints:
  namespace: project_pulse
  strategy: timestamp_watermark

mysql:
  connect_timeout: 10
  read_timeout: 60
  write_timeout: 60
  pool_size: 5
  max_overflow: 10

neo4j:
  database: neo4j
  fetch_size: 1000
  max_connection_lifetime_seconds: 3600
  connection_acquisition_timeout_seconds: 30

metadata_db:
  pool_size: 5
  max_overflow: 10

observability:
  metrics_enabled: true
  tracing_enabled: false
  healthcheck_enabled: true

scheduler:
  enabled: true
  timezone: UTC